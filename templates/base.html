<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TM Révisions — {% block title %}Accueil{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h1>TM Révisions</h1>
            <small>Operations Control</small>
        </div>
        <nav>
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Campagnes</a>
            <a href="/campaigns/new" class="{% if '/campaigns/new' in request.path %}active{% endif %}">Nouveau planning</a>
            {% if '/campaigns/' in request.path and '/new' not in request.path %}
            <a href="{{ request.path.split('/calendar')[0] }}/calendar" class="{% if '/calendar' in request.path %}active{% endif %}">Calendrier</a>
            {% endif %}
        </nav>
        <div class="sidebar-footer">
            <a href="/logout">Déconnexion</a>
        </div>
    </aside>
    <main class="main">
        {% block content %}{% endblock %}
    </main>
</div>
</body>
</html>
