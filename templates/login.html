<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TM Révisions — Connexion</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-brand">
            <h1>// TM Révisions</h1>
            <p>Authentification requise</p>
        </div>
        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
            <div class="form-group">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" class="form-input" placeholder="Entrez le mot de passe" autofocus>
            </div>
            <button type="submit" class="btn btn-primary form-submit">Accéder au système</button>
        </form>
    </div>
</div>
</body>
</html>
